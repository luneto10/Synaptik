root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o /app/tmp/main ."
  entrypoint = "/app/tmp/main" 
  delay = 1000
  exclude_dir = ["tmp", "vendor", "node_modules"]
  include_ext = ["go", "tpl", "tmpl", "html", "env"]
  exclude_file = ["go.sum"]
  stop_on_error = true
  poll = true
  poll_interval = 500

[log]
  time = true

[color]
  main = "magenta"
  build = "yellow"
  runner = "green"